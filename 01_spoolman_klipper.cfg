# ===========================================================
# Spoolman / NFC / Fluidd tracking
# Moonraker-driven active spool
# ===========================================================

[save_variables]
filename: /home/lava/printer_data/config/extended/variables.cfg

[gcode_macro SPOOL_STATE]
variable_ch0: -1
variable_ch1: -1
variable_ch2: -1
variable_ch3: -1
gcode:

# -----------------------------------------------------------
# Moonraker / Spoolman
# -----------------------------------------------------------

[gcode_macro SET_ACTIVE_SPOOL]
gcode:
  {% if params.ID is defined %}
    {% set id = params.ID|int %}
    {action_call_remote_method("spoolman_set_active_spool", spool_id=id)}
    {action_respond_info("ACTIVE SPOOL -> %d" % id)}
  {% else %}
    {action_respond_info("SET_ACTIVE_SPOOL requires ID")}
  {% endif %}

[gcode_macro CLEAR_ACTIVE_SPOOL]
gcode:
  {action_call_remote_method("spoolman_set_active_spool", spool_id=None)}
  {action_respond_info("ACTIVE SPOOL CLEARED")}

# -----------------------------------------------------------
# Channel assignment helpers
# -----------------------------------------------------------

[gcode_macro SET_CHANNEL_SPOOL]
gcode:
  {% if 'CHANNEL' not in params or 'ID' not in params %}
    {action_respond_info("SET_CHANNEL_SPOOL requires CHANNEL and ID")}
  {% else %}
    {% set ch = params.CHANNEL|int %}
    {% set id = params.ID|int %}

    {% if ch == 0 %}
      SET_GCODE_VARIABLE MACRO=SPOOL_STATE VARIABLE=ch0 VALUE={id}
      SAVE_VARIABLE VARIABLE=spool_ch0 VALUE={id}
    {% elif ch == 1 %}
      SET_GCODE_VARIABLE MACRO=SPOOL_STATE VARIABLE=ch1 VALUE={id}
      SAVE_VARIABLE VARIABLE=spool_ch1 VALUE={id}
    {% elif ch == 2 %}
      SET_GCODE_VARIABLE MACRO=SPOOL_STATE VARIABLE=ch2 VALUE={id}
      SAVE_VARIABLE VARIABLE=spool_ch2 VALUE={id}
    {% elif ch == 3 %}
      SET_GCODE_VARIABLE MACRO=SPOOL_STATE VARIABLE=ch3 VALUE={id}
      SAVE_VARIABLE VARIABLE=spool_ch3 VALUE={id}
    {% else %}
      {action_respond_info("Invalid CHANNEL")}
    {% endif %}

    {action_respond_info("CHANNEL %d -> SPOOL %d" % (ch, id))}
  {% endif %}

[gcode_macro CLEAR_CHANNEL_SPOOL]
gcode:
  {% if 'CHANNEL' not in params %}
    {action_respond_info("CLEAR_CHANNEL_SPOOL requires CHANNEL")}
  {% else %}
    {% set ch = params.CHANNEL|int %}

    {% if ch == 0 %}
      SET_GCODE_VARIABLE MACRO=SPOOL_STATE VARIABLE=ch0 VALUE=-1
      SAVE_VARIABLE VARIABLE=spool_ch0 VALUE=-1
    {% elif ch == 1 %}
      SET_GCODE_VARIABLE MACRO=SPOOL_STATE VARIABLE=ch1 VALUE=-1
      SAVE_VARIABLE VARIABLE=spool_ch1 VALUE=-1
    {% elif ch == 2 %}
      SET_GCODE_VARIABLE MACRO=SPOOL_STATE VARIABLE=ch2 VALUE=-1
      SAVE_VARIABLE VARIABLE=spool_ch2 VALUE=-1
    {% elif ch == 3 %}
      SET_GCODE_VARIABLE MACRO=SPOOL_STATE VARIABLE=ch3 VALUE=-1
      SAVE_VARIABLE VARIABLE=spool_ch3 VALUE=-1
    {% else %}
      {action_respond_info("Invalid CHANNEL")}
    {% endif %}

    {action_respond_info("Cleared channel %d" % ch)}
  {% endif %}

[gcode_macro CLEAR_ALL_CHANNEL_SPOOLS]
gcode:
  CLEAR_CHANNEL_SPOOL CHANNEL=0
  CLEAR_CHANNEL_SPOOL CHANNEL=1
  CLEAR_CHANNEL_SPOOL CHANNEL=2
  CLEAR_CHANNEL_SPOOL CHANNEL=3

# -----------------------------------------------------------
# Active spool selection
# -----------------------------------------------------------

[gcode_macro USE_CHANNEL]
gcode:
  {% if 'CHANNEL' not in params %}
    {action_respond_info("USE_CHANNEL requires CHANNEL")}
  {% else %}
    {% set ch = params.CHANNEL|int %}
    {% set s = printer["gcode_macro SPOOL_STATE"] %}

    {% if ch == 0 %}
      {% set id = s.ch0|int %}
    {% elif ch == 1 %}
      {% set id = s.ch1|int %}
    {% elif ch == 2 %}
      {% set id = s.ch2|int %}
    {% elif ch == 3 %}
      {% set id = s.ch3|int %}
    {% else %}
      {% set id = -1 %}
    {% endif %}

    {% if id >= 0 %}
      SET_ACTIVE_SPOOL ID={id}
      {action_respond_info("USE_CHANNEL %d -> spool %d" % (ch, id))}
    {% else %}
      CLEAR_ACTIVE_SPOOL
      {action_respond_info("USE_CHANNEL %d -> no spool" % ch)}
    {% endif %}
  {% endif %}

[gcode_macro USE_ACTIVE_EXTRUDER_CHANNEL]
gcode:
  {% set e = printer.toolhead.extruder|string %}
  {% if e == "extruder" %}
    USE_CHANNEL CHANNEL=0
  {% elif e == "extruder1" %}
    USE_CHANNEL CHANNEL=1
  {% elif e == "extruder2" %}
    USE_CHANNEL CHANNEL=2
  {% elif e == "extruder3" %}
    USE_CHANNEL CHANNEL=3
  {% else %}
    CLEAR_ACTIVE_SPOOL
    {action_respond_info("Unknown extruder")}
  {% endif %}

# -----------------------------------------------------------
# Tool wrappers (unchanged behavior, no UI vars)
# -----------------------------------------------------------

[gcode_macro T0]
rename_existing: T0.10001
gcode:
  T0.10001 {rawparams}
  USE_ACTIVE_EXTRUDER_CHANNEL

[gcode_macro T1]
rename_existing: T1.10001
gcode:
  T1.10001 {rawparams}
  USE_ACTIVE_EXTRUDER_CHANNEL

[gcode_macro T2]
rename_existing: T2.10001
gcode:
  T2.10001 {rawparams}
  USE_ACTIVE_EXTRUDER_CHANNEL

[gcode_macro T3]
rename_existing: T3.10001
gcode:
  T3.10001 {rawparams}
  USE_ACTIVE_EXTRUDER_CHANNEL

# -----------------------------------------------------------
# Print-start NFC sync
# -----------------------------------------------------------

[gcode_macro START_SPOOLMAN_TRACKING]
gcode:
  CLEAR_ALL_CHANNEL_SPOOLS
  FILAMENT_DT_UPDATE CHANNEL=0
  G4 P800
  FILAMENT_DT_UPDATE CHANNEL=1
  G4 P800
  FILAMENT_DT_UPDATE CHANNEL=2
  G4 P800
  FILAMENT_DT_UPDATE CHANNEL=3
  {action_respond_info("NFC scan started (channels 0-3)")}

# -----------------------------------------------------------
# Restore persisted state
# -----------------------------------------------------------

[delayed_gcode RESTORE_SELECTED_SPOOLS]
initial_duration: 0.5
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set ch0 = svv.spool_ch0|default(-1)|int %}
  {% set ch1 = svv.spool_ch1|default(-1)|int %}
  {% set ch2 = svv.spool_ch2|default(-1)|int %}
  {% set ch3 = svv.spool_ch3|default(-1)|int %}

  SET_GCODE_VARIABLE MACRO=SPOOL_STATE VARIABLE=ch0 VALUE={ch0}
  SET_GCODE_VARIABLE MACRO=SPOOL_STATE VARIABLE=ch1 VALUE={ch1}
  SET_GCODE_VARIABLE MACRO=SPOOL_STATE VARIABLE=ch2 VALUE={ch2}
  SET_GCODE_VARIABLE MACRO=SPOOL_STATE VARIABLE=ch3 VALUE={ch3}

  {action_respond_info("Restored saved spool assignments")}

# -----------------------------------------------------------
# Debug
# -----------------------------------------------------------

[gcode_macro SHOW_SPOOL_STATE]
gcode:
  {% set s = printer["gcode_macro SPOOL_STATE"] %}
  {% set e = printer.toolhead.extruder|string %}

  {action_respond_info(
    "extruder=%s ch0=%d ch1=%d ch2=%d ch3=%d" %
    (e, s.ch0|int, s.ch1|int, s.ch2|int, s.ch3|int)
  )}